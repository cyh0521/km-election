<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金門選舉資料庫</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-inner">
        <h1 class="header-title"><span onclick="renderMainMenu()">金門選舉資料庫</span></h1>

        <!-- 候選人名鑑（右側圖示） -->
        <button class="header-icon-btn" type="button" onclick="renderCandidateDirectory(true)" aria-label="候選人名鑑" title="候選人名鑑">
            <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M8 7h11" />
                <path d="M8 12h11" />
                <path d="M8 17h11" />
                <path d="M4 7h.01" />
                <path d="M4 12h.01" />
                <path d="M4 17h.01" />
            </svg>
        </button>
    </div>
</header>

<div class="container">
    <div id="breadcrumb" class="breadcrumb" style="display:none;"></div>
    
    <div id="content">
        <div class="loading-state">資料載入中...</div>
    </div>

    <div id="breadcrumb-bottom" class="breadcrumb" style="display:none;"></div>
</div>

<footer>
    <span id="footer-source">資料來源︱中選會選舉及公投資料庫．政大選研中心資料庫</span><br>
    <span id="footer-source">v0.5.251217</span>
</footer>

<div id="candidate-modal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <span class="modal-close-btn" onclick="closeModal()">&times;</span>
        <div id="modal-body" class="modal-body">
            </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
