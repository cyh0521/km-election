<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金門選舉資料庫</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="candidate-directory.css">
</head>
<body>

<header>
  <h1><span onclick="renderMainMenu()">金門選舉資料庫</span></h1>

  <!-- 候選人名鑑（右側圖示） -->
  <button id="candidate-directory-open" class="header-icon-btn" type="button" disabled aria-label="候選人名鑑" title="候選人名鑑">
    <svg class="header-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-4.418 0-8 2.015-8 4.5V20h16v-1.5c0-2.485-3.582-4.5-8-4.5Z"></path>
      <path d="M20 4h-2V2h-2v2h-2v2h2v2h2V6h2V4Z"></path>
    </svg>
  </button>
</header>

<div class="container">
  <div id="breadcrumb" class="breadcrumb"></div>
  <div id="content"></div>
  <div id="breadcrumb-bottom" class="breadcrumb"></div>
</div>

<footer>
  <div>資料來源：金門縣選舉委員會公告、中央選舉委員會公開資料等（依各選舉頁面標註為準）</div>
  <span id="footer-source">v0.5.251217</span>
</footer>

<div id="candidate-modal" class="modal-overlay" onclick="closeModal()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <span class="modal-close-btn" onclick="closeModal()">&times;</span>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<script src="script.js"></script>
<script src="candidate-directory.js"></script>
</body>
</html>
